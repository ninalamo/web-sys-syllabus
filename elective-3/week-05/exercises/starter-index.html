<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 5: State-Driven Todo List</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2em auto; }
        .todo { padding: 0.5em; border-bottom: 1px solid #eee; }
        .todo.completed { text-decoration: line-through; color: #999; }
        .delete-btn { color: red; cursor: pointer; margin-left: 1em; }
    </style>
</head>
<body>
    <h1>Todo List</h1>
    <input type="text" id="todoInput" placeholder="Add a todo...">
    <button id="addBtn">Add</button>
    <div id="app"></div>
    <script src="app.js"></script>
</body>
</html>
